    <section id="main" class="outer"><article id="post-如何让category支持属性" class="article article-type-post" itemscope itemprop="blogPost">

    <h1 class="article-title" itemprop="name">
      如何让category支持属性
    </h1>
  

      </header>
    
    <div class="article-meta">
      <a href="/2015/08/31/如何让category支持属性/" class="article-date">
  <time datetime="2015-08-31T15:03:46.000Z" itemprop="datePublished">2015-08-31</time>
</a>
      
  <div class="article-category">
    <a class="article-category-link" href="/categories/基础/">基础</a>
  </div>

      
    </div>
    <div class="article-entry" itemprop="articleBody">
      
        <p>category不能增加类的属性，这是category和extention的重要区别之一。但是通过category给类增加属性并非不可实现，比如用runtime设置关联就是一种可行的实现方式。</p>
<a id="more"></a>
<p>首先在category头文件中声明属性：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div></pre></td><td class="code"><pre><div class="line">@interface NSObject (nameTest)</div><div class="line">@property (nonatomic, copy) NSString *name;</div><div class="line">@end</div></pre></td></tr></table></figure>
<p>然后在.m文件中增加关联：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><div class="line">1</div><div class="line">2</div><div class="line">3</div><div class="line">4</div><div class="line">5</div><div class="line">6</div><div class="line">7</div><div class="line">8</div><div class="line">9</div><div class="line">10</div><div class="line">11</div><div class="line">12</div><div class="line">13</div><div class="line">14</div><div class="line">15</div><div class="line">16</div></pre></td><td class="code"><pre><div class="line">@implementation NSObject (nameTest)</div><div class="line">// 定义关联的key</div><div class="line">static const char *key = &quot;name&quot;;</div><div class="line">- (NSString *)name</div><div class="line">&#123;</div><div class="line">    // 根据关联的key，获取关联的值。</div><div class="line">    return objc_getAssociatedObject(self, key);</div><div class="line">&#125;</div><div class="line">- (void)setName:(NSString *)name</div><div class="line">&#123;</div><div class="line">    // 第一个参数：给哪个对象添加关联</div><div class="line">    // 第二个参数：关联的key，通过这个key获取</div><div class="line">    // 第三个参数：关联的value</div><div class="line">    // 第四个参数:关联的策略</div><div class="line">    objc_setAssociatedObject(self, key, name, OBJC_ASSOCIATION_RETAIN_NONATOMIC);</div><div class="line">&#125;</div></pre></td></tr></table></figure>
